{ id: 160, q: "Según la Ley 39/2015, el plazo máximo para resolver y notificar un procedimiento podrá suspenderse cuando:", o: ["El interesado solicite la suspensión de forma expresa.", "Deban realizarse pruebas técnicas o análisis contradictorios.", "Exista acumulación de expedientes en el órgano competente.", "El procedimiento se inicie de oficio."], c: 1 },
{ id: 161, q: "Según la Ley 39/2015, la suspensión del plazo máximo para resolver deberá:", o: ["Comunicarse a los interesados, indicando el motivo y la duración.", "Acordarse siempre de oficio por el órgano competente.", "Publicarse en el boletín oficial correspondiente.", "Solicitarse por el interesado afectado."], c: 0 },
{ id: 162, q: "Según la Ley 39/2015, los plazos expresados en días se contarán:", o: ["A partir del día siguiente al de la notificación o publicación.", "Incluyendo siempre los sábados, domingos y festivos.", "Desde el mismo día en que se produce la notificación.", "Únicamente en días naturales."], c: 0 },
{ id: 163, q: "Según la Ley 39/2015, cuando un plazo se exprese en días hábiles:", o: ["Se incluirán los sábados, domingos y festivos.", "Se excluirán los sábados, domingos y festivos.", "Se excluirán únicamente los domingos.", "Se incluirán todos los días del año."], c: 1 },
{ id: 164, q: "Según la Ley 39/2015, cuando el último día de un plazo sea inhábil:", o: ["El plazo se entenderá finalizado ese mismo día.", "El plazo se ampliará automáticamente cinco días.", "El plazo se entenderá prorrogado al primer día hábil siguiente.", "El plazo quedará suspendido hasta nueva notificación."], c: 2 },
{ id: 165, q: "Según la Ley 39/2015, los actos administrativos deberán dictarse:", o: ["Siempre por escrito y en soporte papel.", "Por el órgano competente, ajustándose al procedimiento establecido.", "Únicamente mediante medios electrónicos.", "De forma motivada en todos los casos."], c: 1 },
{ id: 166, q: "Según la Ley 39/2015, los actos administrativos producirán efectos:", o: ["Desde la fecha en que se dicten.", "Desde el día siguiente al de su notificación.", "Desde la fecha en que se notifiquen o publiquen, salvo que en ellos se disponga otra cosa.", "Únicamente desde su publicación en el boletín oficial correspondiente."], c: 2 },
{ id: 167, q: "Según la Ley 39/2015, serán nulos de pleno derecho los actos administrativos que:", o: ["Incurran en cualquier infracción del ordenamiento jurídico.", "Se dicten fuera de plazo.", "Carezcan de motivación.", "Lesionen derechos y libertades susceptibles de amparo constitucional."], c: 3 },
{ id: 168, q: "Según la Ley 39/2015, serán anulables los actos administrativos que:", o: ["Incurran en infracción del ordenamiento jurídico, incluso la desviación de poder.", "Lesionen derechos fundamentales.", "Sean dictados por órgano manifiestamente incompetente por razón de la materia.", "b) y c) son correctas"], c: 0 },
{ id: 169, q: "Según la Ley 39/2015, los actos administrativos deberán ser motivados:", o: ["En todos los casos.", "Solo cuando lo solicite el interesado.", "En los supuestos previstos legalmente.", "Únicamente cuando se dicten por delegación."], c: 2 },
{ id: 170, q: "Según la Ley 39/2015, cuando el acto administrativo carezca de los requisitos formales indispensables:", o: ["Será siempre nulo de pleno derecho.", "Será anulable cuando produzca indefensión.", "No producirá ningún efecto jurídico.", "Deberá ser archivado sin tramitación."], c: 1 },
{ id: 171, q: "Según la Ley 39/2015, los recursos administrativos se fundamentan en el principio de:", o: ["Jerarquía normativa.", "Legalidad y eficacia administrativa.", "Revisión de los actos en vía administrativa.", "Tutela judicial efectiva."], c: 2 },
{ id: 172, q: "Según la Ley 39/2015, contra los actos que no pongan fin a la vía administrativa podrá interponerse:", o: ["Recurso potestativo de reposición.", "Recurso extraordinario de revisión.", "Recurso contencioso-administrativo.", "Recurso de alzada."], c: 3 },
{ id: 173, q: "Según la Ley 39/2015, el plazo para interponer recurso de alzada será de:", o: ["Un mes en todo caso.", "Un mes si el acto es expreso y en cualquier momento si no lo es.", "Dos meses desde la notificación.", "Tres meses desde la publicación."], c: 1 },
{ id: 174, q: "Según la Ley 39/2015, el recurso potestativo de reposición se interpone:", o: ["Contra actos que pongan fin a la vía administrativa.", "Siempre antes de acudir a la vía contencioso-administrativa.", "Contra actos que no pongan fin a la vía administrativa.", "Únicamente contra actos presuntos."], c: 0 },
{ id: 175, q: "Según la Ley 39/2015, la interposición del recurso potestativo de reposición:", o: ["Suspende automáticamente la ejecución del acto.", "Impide acudir a la vía contencioso-administrativa hasta su resolución.", "Permite interponer simultáneamente recurso contencioso-administrativo.", "Sustituye al recurso de alzada."], c: 1 },
{ id: 176, q: "Según la Ley 39/2015, el plazo máximo para dictar y notificar resolución en el recurso de alzada será de:", o: ["Un mes.", "Dos meses.", "Tres meses.", "Seis meses."], c: 2 },
{ id: 177, q: "Según la Ley 39/2015, transcurrido el plazo para resolver el recurso de alzada sin que recaiga resolución expresa:", o: ["Se entenderá estimado por silencio administrativo.", "Se entenderá desestimado por silencio administrativo.", "Se producirá la caducidad del procedimiento.", "Se archivará automáticamente el recurso"], c: 1 },
{ id: 178, q: "Según la Ley 39/2015, el plazo para interponer recurso potestativo de reposición será de:", o: ["Un mes si el acto es expreso.", "Dos meses si el acto es expreso.", "Tres meses desde la notificación.", "En cualquier momento"], c: 0 },
{ id: 179, q: "Según la Ley 39/2015, el plazo máximo para resolver el recurso potestativo de reposición será de:", o: ["Un mes.", "Dos meses.", "Tres meses.", "Seis meses."], c: 0 },
{ id: 180, q: "Según la Ley 39/2015, el recurso extraordinario de revisión podrá interponerse cuando:", o: ["El acto sea anulable.", "Existan errores materiales evidentes.", "Aparezcan documentos de valor esencial ignorados al dictarse el acto.", "El interesado no haya sido notificado."], c: 2 },
{ id: 181, q: "Según la Ley 39/2015, el recurso extraordinario de revisión podrá interponerse cuando:", o: ["Se haya dictado el acto fuera de plazo.", "Al dictarlos se hubiera incurrido en error de hecho que resulte de los propios documentos incorporados al expediente.", "El acto no haya sido motivado.", "El interesado no esté conforme con la resolución."], c: 1 },
{ id: 182, q: "Según la Ley 39/2015, el plazo para interponer recurso extraordinario de revisión por error de hecho será de:", o: ["Un año desde la notificación del acto impugnado.", "Dos años desde la notificación del acto impugnado.", "Cuatro años desde la notificación del acto impugnado.", "En cualquier momento."], c: 2 },
{ id: 183, q: "Según la Ley 39/2015, el recurso extraordinario de revisión por aparición de documentos de valor esencial deberá interponerse en el plazo de:", o: ["Un mes desde el conocimiento de los documentos.", "Tres meses desde el conocimiento de los documentos.", "Cuatro meses desde el conocimiento de los documentos", "En cualquier momento."], c: 1 },
{ id: 184, q: "Según la Ley 39/2015, contra la resolución del recurso extraordinario de revisión:", o: ["Cabe recurso de alzada.", "Cabe recurso potestativo de reposición.", "Cabe un nuevo recurso extraordinario de revisión.", "No cabe ningún otro recurso administrativo."], c: 3 },
{ id: 185, q: "Según la Ley 39/2015, el recurso extraordinario de revisión se interpondrá ante:", o: ["El órgano superior jerárquico.", "El órgano que dictó el acto impugnado.", "El órgano instructor del procedimiento.", "El órgano competente para resolver el recurso de alzada."], c: 1 },
{ id: 186, q: "Según la Ley 39/2015, será causa de inadmisión de un recurso administrativo:", o: ["Que el interesado no esté conforme con la resolución.", "Carecer manifiestamente de fundamento.", "Que el recurso se interponga por vía electrónica.", "Que el acto sea anulable."], c: 1 },
{ id: 187, q: "Según la Ley 39/2015, la interposición de un recurso administrativo:", o: ["Suspende automáticamente la ejecución del acto impugnado.", "Suspende siempre la ejecución en vía administrativa.", "No suspende la ejecución del acto, salvo que una norma lo establezca o se acuerde motivadamente.", "Impide la notificación del acto."], c: 2 },
{ id: 188, q: "Según la Ley 39/2015, la competencia para resolver un recurso de alzada corresponde:", o: ["Al mismo órgano que dictó el acto.", "Al órgano superior jerárquico del que dictó el acto.", "Al órgano instructor del procedimiento.", "Al órgano que determine el interesado."], c: 1 },
{ id: 189, q: "Según la Ley 39/2015, los actos administrativos que incurran en defectos formales:", o: ["Serán anulables cuando carezcan de los requisitos formales indispensables o produzcan indefensión.", "Serán siempre nulos de pleno derecho.", "No producirán efectos jurídicos.", "Se considerarán inexistentes."], c: 0 },
{ id: 190, q: "Según la Ley 39/2015, los actos nulos de pleno derecho:", o: ["Podrán convalidarse en cualquier caso.", "Podrán subsanarse por el transcurso del tiempo.", "No serán susceptibles de convalidación.", "Serán anulables si no se impugnan en plazo."], c: 2 },
{ id: 191, q: "Según la Ley 39/2015, los actos administrativos podrán tener efectos retroactivos:", o: ["En ningún caso.", "Cuando así lo establezca siempre una norma con rango de ley.", "Cuando produzcan efectos favorables y no lesionen derechos o intereses legítimos de otras personas.", "Únicamente en procedimientos sancionadores."], c: 2 },
{ id: 192, q: "Según la Ley 39/2015, los actos anulables podrán ser convalidados:", o: ["En cualquier momento y por cualquier órgano.", "Por el órgano que los dictó o su superior jerárquico, subsanando los vicios de que adolezcan.", "Únicamente mediante recurso contencioso-administrativo.", "Solo cuando lo solicite el interesado."], c: 1 },
{ id: 193, q: "Según la Ley 39/2015, la ampliación de plazos:", o: ["Podrá concederse de oficio o a petición de los interesados si las circunstancias lo aconsejan.", "Solo podrá concederse a instancia del interesado.", "Será automática cuando el procedimiento sea complejo.", "Podrá concederse aunque haya expirado el plazo inicialmente concedido."], c: 0 },
{ id: 194, q: "Según la Ley 39/2015, cuando se acumulen procedimientos:", o: ["Será obligatoria la acumulación en todo caso.", "Solo se acumularán procedimientos sancionadores.", "La acumulación requerirá consentimiento del interesado.", "Podrán acumularse procedimientos que guarden identidad sustancial o intima conexión."], c: 3 },
{ id: 195, q: "Según la Ley 39/2015, los términos y plazos establecidos en la Ley:", o: ["Solo obligan al personal al servicio de las Administraciones", "Solo obligan a los interesados.", "Obligan tanto a las autoridades y personal al servicio de las Administraciones Públicas como a los interesados.", "Son siempre improrrogables."], c: 2 },
{ id: 196, q: "Según la Ley 39/2015, cuando una notificación sea rechazada por el interesado:", o: ["Se repetirá automáticamente.", "Se considerará intentada sin efecto.", "Se entenderá practicada a todos los efectos legales.", "Se archivará el procedimiento."], c: 2 },
{ id: 197, q: "Según la Ley 39/2015, cuando la notificación se practique por medios electrónicos y no sea posible acceder a su contenido:", o: ["Se entenderá rechazada de inmediato.", "Se entenderá rechazada cuando hayan transcurrido diez días naturales desde su puesta a disposición sin acceder a su contenido.", "Se entenderá rechazada cuando hayan transcurrido quince días naturales desde su puesta a disposición sin acceder a su contenido.", "Se entenderá rechazada cuando haya transcurrido un mes desde su puesta a disposición sin acceder a su contenido."], c: 1 },
{ id: 198, q: "Según la Ley 39/2015, la nulidad de pleno derecho podrá declararse:", o: ["Solo a instancia del interesado.", "De oficio o a instancia del interesado.", "Exclusivamente por vía judicial.", "Únicamente en recurso extraordinario de revisión."], c: 1 },
{ id: 199, q: "Según la Ley 39/2015, los actos administrativos se presumen:", o: ["Nulos mientras no se declare su validez.", "Válidos y producen efectos desde la fecha en que se dicten, salvo disposición en contrario.", "Anulables salvo que se confirme su legalidad.", "Ineficaces hasta su publicación."], c: 1 },
{ id: 200, q: "Según la Ley 39/2015, el silencio administrativo en procedimientos iniciados a solicitud del interesado tendrá carácter:", o: ["Siempre negativo.", "Siempre positivo.", "Estimatorio, salvo que una norma con rango de ley o norma de Derecho de la Unión Europea establezca lo contrario.", "Desestimatorio, salvo que una norma con rango de ley o norma de Derecho de la Unión Europea establezca lo contrario."], c: 2 },
        ];

        const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const App = () => {
            const [view, setView] = useState('menu');
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [failedQueue, setFailedQueue] = useState([]);
            const [correctCount, setCorrectCount] = useState(0);
            const [errorCount, setErrorCount] = useState(0);
            const [selectedId, setSelectedId] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [currentShuffledOptions, setCurrentShuffledOptions] = useState([]);
            const [activeBlock, setActiveBlockName] = useState("");

            useEffect(() => {
                if (view === 'quiz' && questions[currentIndex]) {
                    const originalOptions = questions[currentIndex].o;
                    const correctText = originalOptions[questions[currentIndex].c];
                    const mappedOptions = originalOptions.map((text) => ({
                        text,
                        isCorrect: text === correctText
                    }));
                    setCurrentShuffledOptions(shuffle(mappedOptions));
                    setSelectedId(null);
                    setIsLocked(false);
                }
            }, [view, currentIndex, questions]);

const startBlock = (start, end, title) => {
    const block = RAW_DATA
      .filter(q => q.id >= start && q.id <= end)
      .sort((a, b) => a.id - b.id);

    setQuestions(block); // Orden correlativo 1, 2, 3...
    setActiveBlockName(title);
    setCurrentIndex(0);
    setFailedQueue([]);
    setCorrectCount(0);
    setErrorCount(0);
    setView('quiz');
  };

            const handleOptionClick = (optionIndex) => {
                if (isLocked) return;
                setIsLocked(true);
                setSelectedId(optionIndex);
                if (currentShuffledOptions[optionIndex].isCorrect) {
                    setCorrectCount(prev => prev + 1);
                } else {
                    setErrorCount(prev => prev + 1);
                    setFailedQueue(prev => [...prev, questions[currentIndex]]);
                }
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                } else {
                    if (failedQueue.length > 0) {
                        setQuestions(shuffle([...new Set(failedQueue)]));
                        setFailedQueue([]);
                        setCurrentIndex(0);
                    } else {
                        setView('result');
                    }
                }
            };

            const progress = questions.length > 0 ? ((currentIndex + 1) / questions.length) * 100 : 0;

            if (view === 'menu') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 md:p-12">
                        <div className="max-w-5xl w-full">
                            <header className="mb-12 text-center md:text-left">
                                <div className="flex items-center justify-center md:justify-start gap-4 mb-4">
                                    <div className="bg-indigo-600 p-3 rounded-2xl shadow-xl">
                                        <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                                    </div>
                                    <h1 className="text-3xl font-black text-slate-800 tracking-tighter uppercase">SIMULADOR OPE OSAKIDETZA</h1>
                                </div>
                                <p className="text-slate-500 font-bold tracking-wide uppercase text-xs">Auxiliar Administrativo - Temario Específico</p>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <BlockCard id="1" title="Inst. y Marco Jurídico" range="1 - 16" onClick={() => startBlock(1, 16, "Instituciones")} active />
                                <BlockCard id="2" title="Derechos del Paciente" range="17 - 35" onClick={() => startBlock(17, 35, "Derechos")} active />
                                <BlockCard id="3" title="Prev. Riesgos Laborales" range="36 - 67" onClick={() => startBlock(36, 67, "Prevención")} active />
                                <BlockCard id="4" title="Régimen Jurídico" range="68 - 83" onClick={() => startBlock(68, 83, "Régimen")} active />
                                <BlockCard id="5" title="Función Pública" range="84 - 117" onClick={() => startBlock(84, 117, "Función Pública")} active />
                                <BlockCard id="6" title="Estatutos y Org." range="118 - 134" onClick={() => startBlock(118, 134, "Estatutos")} active />
                                <BlockCard id="7" title="Proc. Administrativo" range="135 - 200" onClick={() => startBlock(135, 200, "Procedimiento")} active />
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl max-w-md w-full text-center border border-slate-100">
                            <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                                <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>
                            </div>
                            <h2 className="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">¡Superado!</h2>
                            <p className="text-slate-500 mb-10 font-medium leading-relaxed">Has completado el bloque corrigiendo todos los errores.</p>
                            <button onClick={() => setView('menu')} className="w-full bg-slate-900 hover:bg-black text-white font-black py-5 rounded-2xl transition-all shadow-xl tracking-widest uppercase text-sm">
                                Volver al menú
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentIndex];

            return (
                <div className="min-h-screen pb-24 bg-slate-50">
                    <div className="max-w-4xl mx-auto px-4 pt-12">
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 sticky top-4 z-40 mb-8">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex flex-col">
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">{activeBlock}</span>
                                    <span className="text-xl font-black text-slate-800 tracking-tighter">{currentIndex + 1} <span className="text-slate-200 mx-1">/</span> {questions.length}</span>
                                </div>
                                <div className="flex gap-3">
                                    <StatCard label="CORRECTAS" value={correctCount} color="text-emerald-600" borderColor="border-emerald-100" />
                                    <StatCard label="FALLADAS" value={errorCount} color="text-rose-500" borderColor="border-rose-100" />
                                </div>
                            </div>
                            <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-500 transition-all duration-700 ease-out shadow-[0_0_12px_rgba(99,102,241,0.3)]" style={{ width: `${progress}%` }} />
                            </div>
                        </div>

                        <div className="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-sm border border-slate-200 mb-8">
                            <div className="flex gap-4 mb-10">
                                <span className="text-indigo-600 font-black text-xl leading-none">{currentQ.id}.</span>
                                <h2 className="text-xl md:text-2xl font-bold text-slate-800 leading-[1.35] tracking-tight">{currentQ.q}</h2>
                            </div>
                            <div className="space-y-4">
                                {currentShuffledOptions.map((opt, i) => {
                                    let btnStyle = "bg-slate-50 border-slate-200 hover:border-indigo-300 hover:bg-white";
                                    let icon = null;
                                    if (isLocked) {
                                        if (opt.isCorrect) {
                                            btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-800 ring-4 ring-emerald-100 shadow-sm";
                                            icon = <svg className="w-5 h-5 text-emerald-600" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
                                        } else if (selectedId === i) {
                                            btnStyle = "bg-rose-50 border-rose-500 text-rose-800 ring-4 ring-rose-100 shadow-sm";
                                            icon = <svg className="w-5 h-5 text-rose-600" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
                                        } else { btnStyle = "bg-slate-50 border-slate-100 opacity-40 grayscale"; }
                                    }
                                    return (
                                        <button key={i} onClick={() => handleOptionClick(i)} disabled={isLocked} className={`w-full p-6 text-left rounded-[1.75rem] border-2 transition-all flex items-start gap-5 option-enter ${btnStyle}`} style={{animationDelay: `${i * 0.05}s`}}>
                                            <span className={`w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-xl text-xs font-black ${isLocked && opt.isCorrect ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-200 text-slate-500'}`}>
                                                {String.fromCharCode(65 + i)}
                                            </span>
                                            <span className="flex-grow font-medium text-slate-700 leading-relaxed">{opt.text}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {isLocked && (
                            <button onClick={nextQuestion} className="w-full bg-slate-900 hover:bg-black text-white py-6 rounded-3xl font-black shadow-2xl transition-all flex items-center justify-center gap-3 group tracking-widest text-xs uppercase">
                                {currentIndex < questions.length - 1 || failedQueue.length > 0 ? 'CONTINUAR' : 'VER RESULTADOS'}
                                <svg className="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                            </button>
                        )}

                        <div className="mt-16 flex justify-start">
                            <button onClick={() => setView('menu')} className="text-slate-400 hover:text-slate-900 font-black text-[10px] transition-all flex items-center gap-2 group tracking-widest uppercase">
                                <svg className="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                                Abandonar test
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, color, borderColor }) => (
            <div className={`flex flex-col items-center justify-center px-6 py-2 bg-white rounded-2xl border ${borderColor} shadow-sm min-w-[110px]`}>
                <span className={`text-[8px] font-black tracking-[0.2em] mb-1 opacity-60 ${color}`}>{label}</span>
                <span className={`text-xl font-black ${color} tabular-nums`}>{value}</span>
            </div>
        );

        const BlockCard = ({ id, title, range, onClick, active = false }) => (
            <button onClick={onClick} className={`group relative p-8 bg-white rounded-[2.5rem] border-2 transition-all text-left shadow-sm hover:shadow-xl hover:-translate-y-1 ${active ? 'border-indigo-100 hover:border-indigo-400' : 'border-slate-50 opacity-60 grayscale cursor-not-allowed'}`}>
                <div className={`absolute top-4 right-8 font-black text-7xl select-none transition-colors ${active ? 'text-indigo-50 group-hover:text-indigo-100' : 'text-slate-100'}`}>{id}</div>
                <div className="relative z-10">
                    <span className={`inline-block px-3 py-1 rounded-lg text-[9px] font-black tracking-widest mb-5 uppercase ${active ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-400'}`}>BLOQUE {id}</span>
                    <h3 className={`font-bold text-xl mb-2 leading-tight pr-6 ${active ? 'text-slate-800' : 'text-slate-400'}`}>{title}</h3>
                    <p className={`text-sm font-medium ${active ? 'text-slate-400' : 'text-slate-300'}`}>Preguntas {range}</p>
                </div>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
